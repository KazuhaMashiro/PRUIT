
<!doctype html>
<html lang="en">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Catcher</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; margin: 0; overflow: hidden; }
    #game-canvas { display: block; }
    #webcam-preview { position: fixed; bottom: 12px; right: 12px; border-radius: 12px; overflow: hidden; border: 3px solid rgba(255,255,255,0.6); z-index: 10; width: 140px; height: 105px; }
    #webcam-preview video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); z-index: 20; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>

 </head>
 <body data-template-id="__page-root" class="bg-gradient-to-b from-sky-300 to-sky-600 min-h-screen flex flex-col items-center justify-center">
  <header class="fixed top-0 left-0 right-0 z-10 flex justify-between items-center p-4">
   <h1 data-template-id="game-title" class="canva-text text-2xl drop-shadow-lg"></h1>
   <div class="flex items-center gap-4">
    <div class="flex items-center gap-2"><span data-template-id="lives-label" class="canva-text text-lg"></span> <span id="lives-value" class="text-2xl font-bold text-white drop-shadow">❤️❤️❤️</span>
    </div>
    <div class="flex items-center gap-2"><span data-template-id="score-label" class="canva-text text-lg"></span> <span id="score-value" class="text-2xl font-bold text-white drop-shadow">0</span>
    </div>
   </div>
  </header>
  <div id="start-overlay" class="overlay">
   <div class="text-center">
    <p data-template-id="start-message" class="canva-text text-xl mb-4"></p><button data-template-id="start-button" class="canva-button px-8 py-3 rounded-xl text-lg font-bold shadow-lg" onclick="startGame()"></button>
   </div>
  </div>
  <div id="gameover-overlay" class="overlay hidden">
   <div class="text-center">
    <p data-template-id="gameover-text" class="canva-text text-3xl font-bold mb-2"></p>
    <p id="final-score" class="text-white text-xl mb-4"></p><button data-template-id="restart-button" class="canva-button px-8 py-3 rounded-xl text-lg font-bold shadow-lg" onclick="startGame()"></button>
   </div>
  </div>
  <canvas id="game-canvas"></canvas>
  <div id="webcam-preview">
   <video id="webcam-video" autoplay playsinline muted></video>
  </div>
  <div id="direction-label" class="fixed bottom-32 right-12 bg-black bg-opacity-70 text-white px-4 py-2 rounded-lg font-bold text-lg drop-shadow-lg z-10">
   Neutral
  </div>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/PNTWp2oMW/";
    let model, webcam, video;
    let canvas, ctx;
    let basket = { x: 0, w: 120, h: 80 };
    let fruits = [];
    let score = 0, missed = 0, running = false;
    let direction = 'none';
    const fruitEmojis = ['🍎','🍊','🍋','🍇','🍓','🍑','🍌'];
    const basketSpeed = 4;

    function resize() {
      canvas = document.getElementById('game-canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      basket.x = canvas.width / 2 - basket.w / 2;
    }
    window.addEventListener('resize', resize);
    resize();
    ctx = canvas.getContext('2d');

    async function setupWebcam() {
      video = document.getElementById('webcam-video');
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 200, height: 200, facingMode: 'user' }
      });
      video.srcObject = stream;
      await new Promise(resolve => { video.onloadedmetadata = resolve; });
      await video.play();
    }

    async function loadModel() {
      const modelURL = MODEL_URL + "model.json";
      const metadataURL = MODEL_URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
    }

    async function predictLoop() {
      if (model && video && video.readyState >= 2) {
        try {
          const preds = await model.predict(video);
          let best = preds.reduce((a, b) => a.probability > b.probability ? a : b);
          let cls = best.className.toLowerCase().trim();

          if (cls.includes('left') && best.probability > 0.6) direction = 'left';
          else if (cls.includes('right') && best.probability > 0.6) direction = 'right';
          else if ((cls.includes('neutral') || cls === 'neutral') && best.probability > 0.6) direction = 'none';
          else direction = 'none';
        } catch (e) {
          direction = 'none';
        }
      }

      const label = document.getElementById('direction-label');
      if (direction === 'left') label.textContent = '← Left';
      else if (direction === 'right') label.textContent = 'Right →';
      else label.textContent = 'Neutral';

      requestAnimationFrame(predictLoop);
    }

    function spawnFruit() {
      if (!running) return;
      // Limit spawn area to center half of screen width
      const spawnWidth = canvas.width * 0.5;
      const spawnStart = canvas.width * 0.25;
      fruits.push({
        x: Math.random() * (spawnWidth - 50) + spawnStart + 25,
        y: -50,
        speed: 1.5 + score * 0.03,
        emoji: fruitEmojis[Math.floor(Math.random() * fruitEmojis.length)]
      });
      setTimeout(spawnFruit, Math.max(600, 1500 - score * 20));
    }

    function gameLoop() {
      if (!running) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (direction === 'left') basket.x -= basketSpeed;
      if (direction === 'right') basket.x += basketSpeed;
      basket.x = Math.max(0, Math.min(canvas.width - basket.w, basket.x));

      ctx.font = '60px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🧺', basket.x + basket.w / 2, canvas.height - 25);

      for (let i = fruits.length - 1; i >= 0; i--) {
        let f = fruits[i];
        f.y += f.speed;
        ctx.font = '48px serif';
        ctx.fillText(f.emoji, f.x, f.y);

        if (f.y > canvas.height - 90 && f.y < canvas.height - 20 && f.x > basket.x && f.x < basket.x + basket.w) {
          score++;
          document.getElementById('score-value').textContent = score;
          fruits.splice(i, 1);
        } else if (f.y > canvas.height + 40) {
          missed++;
          fruits.splice(i, 1);
          updateLives();
          if (missed >= 3) { endGame(); return; }
        }
      }
      requestAnimationFrame(gameLoop);
    }

    function endGame() {
      running = false;
      document.getElementById('final-score').textContent = 'Score: ' + score;
      document.getElementById('gameover-overlay').classList.remove('hidden');
    }

    function updateLives() {
      const hearts = '❤️'.repeat(Math.max(0, 3 - missed));
      document.getElementById('lives-value').textContent = hearts || '💔';
    }

    async function startGame() {
      document.getElementById('start-overlay').classList.add('hidden');
      document.getElementById('gameover-overlay').classList.add('hidden');
      score = 0; missed = 0; fruits = [];
      document.getElementById('score-value').textContent = '0';
      updateLives();
      basket.x = canvas.width / 2 - basket.w / 2;
      running = true;

      if (!model) {
        try {
          await setupWebcam();
          await loadModel();
          predictLoop();
        } catch (e) {
          document.addEventListener('keydown', (ev) => {
            if (ev.key === 'ArrowLeft') direction = 'left';
            if (ev.key === 'ArrowRight') direction = 'right';
          });
          document.addEventListener('keyup', () => { direction = 'none'; });
        }
      }

      spawnFruit();
      gameLoop();
    }
  </script>
